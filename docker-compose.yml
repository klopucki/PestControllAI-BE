version: '3.8'

services:
  pc_ai_redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.1
    container_name: pc_ai_redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 256M
      - --reserve-memory 0M
      - --overprovisioned
      - --check=false
      - --reactor-backend=epoll
      - --node-id 0
      - --set redpanda.auto_create_topics_enabled=true
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:29092
      - --advertise-kafka-addr internal://pc_ai_redpanda:9092,external://localhost:29092
      - --pandaproxy-addr 0.0.0.0:8082
      - --advertise-pandaproxy-addr localhost:28082
    ports:
      - "28082:8082"
      - "29092:29092"
      - "29644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  pc_ai_redpanda_console:
    image: docker.redpanda.com/redpandadata/console:v2.4.3
    container_name: pc_ai_redpanda_console
    environment:
      KAFKA_BROKERS: "pc_ai_redpanda:9092"
    ports:
      - "8888:8080"
    depends_on:
      pc_ai_redpanda:
        condition: service_healthy

  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: pc_ai_swagger_ui
    ports:
      - "8085:8080"
    environment:
      URLS: '[{"url":"http://localhost:5078/swagger/v1/swagger.json","name":"Command API"},{"url":"http://localhost:5284/swagger/v1/swagger.json","name":"Query API"}]'
